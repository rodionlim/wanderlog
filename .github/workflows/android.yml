name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ── Build & test ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_HOME"                     >> local.properties
          printf 'MAPS_API_KEY=%s\n' "${{ secrets.MAPS_API_KEY }}"  >> local.properties

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wanderlog-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Release (tag pushes only) ─────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_HOME"                     >> local.properties
          printf 'MAPS_API_KEY=%s\n' "${{ secrets.MAPS_API_KEY }}"  >> local.properties

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── Optional signing ──────────────────────────────────────────────────────
      # Set KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD in repo
      # secrets to produce a properly signed APK. If omitted the unsigned APK is
      # published instead (installable via adb / sideload with unknown-sources on).
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"

      - name: Align & sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          BT="$ANDROID_HOME/build-tools/$BUILD_TOOLS"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="app/build/outputs/apk/release/wanderlog-${{ github.ref_name }}.apk"

          "$BT/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
          "$BT/apksigner" sign \
            --ks "${{ github.workspace }}/release.keystore" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out "$SIGNED" \
            "$ALIGNED"

      - name: Locate APK to publish
        id: apk
        run: |
          SIGNED="app/build/outputs/apk/release/wanderlog-${{ github.ref_name }}.apk"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$SIGNED" ]; then
            echo "path=$SIGNED" >> "$GITHUB_OUTPUT"
          else
            echo "path=$UNSIGNED" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wanderlog ${{ github.ref_name }}"
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
